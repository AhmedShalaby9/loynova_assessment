name: shopplus_wallet
description: "ShopPlus Wallet — a Flutter wallet app supporting iOS, Android, and Web."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8
  flutter_bloc: ^9.1.1
  equatable: ^2.0.7
  go_router: ^14.8.1
  intl: any
  shimmer: ^3.0.0
  cached_network_image: ^3.4.1
  shopplus_api_client:
    path: packages/shopplus_api_client

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  bloc_test: ^10.0.0
  mocktail: ^1.0.4

flutter:
  uses-material-design: true
  generate: true
